<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zannie Design Studio | AI Apparel Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
    <div class="max-w-5xl mx-auto p-4 md:p-8">
        
        <header class="border-b border-fuchsia-500/30 pb-6 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight bg-gradient-to-r from-fuchsia-400 to-pink-500 bg-clip-text text-transparent">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2 text-fuchsia-400"></i>Zannie Design Studio
                </h1>
                <p class="text-sm text-slate-400 mt-1">Professional AI generation engine for high-quality fashion concepts.</p>
            </div>
            <div class="flex gap-4 items-center">
                <a href="/dev-admin" class="text-sm bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-300 px-4 py-2 rounded-md transition-colors font-mono">← Master Control</a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-1 bg-slate-900 border border-slate-800 p-6 rounded-xl shadow-2xl h-fit">
                <h2 class="text-sm uppercase tracking-widest font-bold mb-4 text-fuchsia-400 font-mono">Generation Parameters</h2>
                
                <div class="mb-4">
                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Apparel Concept Prompt</label>
                    <textarea id="promptInput" rows="4" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-fuchsia-500 transition-colors" placeholder="e.g., A luxury white linen jalabia with intricate gold filigree embroidery, studio lighting..."></textarea>
                </div>

                <button onclick="triggerGeneration()" id="generateBtn" class="w-full bg-fuchsia-600 hover:bg-fuchsia-500 text-white font-bold py-3 rounded-lg transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-microchip"></i> Synthesize Design
                </button>
                
                <div id="statusConsole" class="mt-4 text-[10px] font-mono text-slate-500 hidden">
                    Initializing neural rendering...
                </div>
            </div>

            <div class="md:col-span-2 bg-slate-900 border border-slate-800 p-6 rounded-xl shadow-2xl flex flex-col items-center justify-center min-h-[500px]">
                <div id="outputCanvas" class="w-full h-full flex flex-col items-center justify-center text-slate-600">
                    <i class="fa-solid fa-image text-4xl mb-3 opacity-50"></i>
                    <p class="font-mono text-sm">Awaiting prompt input...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function triggerGeneration() {
            const prompt = document.getElementById('promptInput').value;
            const btn = document.getElementById('generateBtn');
            const consoleOut = document.getElementById('statusConsole');
            const canvas = document.getElementById('outputCanvas');

            if (!prompt) return alert("Please define an apparel concept first.");

            // UI Loading State
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Rendering...';
            btn.disabled = true;
            consoleOut.classList.remove('hidden');
            consoleOut.innerText = "[*] Dispatching payload to AI pipeline...";
            canvas.innerHTML = '<div class="animate-pulse flex flex-col items-center"><div class="w-64 h-96 bg-slate-800 rounded-lg border border-slate-700"></div><p class="text-xs text-fuchsia-400 font-mono mt-4">Synthesizing fabric textures...</p></div>';

            try {
                const response = await fetch('/zannie/api/generate-design', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    consoleOut.innerText = "[+] Render complete. Displaying asset.";
                    consoleOut.classList.replace('text-slate-500', 'text-emerald-400');
                    canvas.innerHTML = `<img src="${data.image_url}" alt="Generated Design" class="rounded-lg shadow-2xl max-h-[600px] border border-slate-700">`;
                } else {
                    consoleOut.innerText = `[-] Pipeline Error: ${data.message}`;
                    consoleOut.classList.replace('text-slate-500', 'text-rose-400');
                }
            } catch (error) {
                consoleOut.innerText = "[-] Network fault connecting to generation endpoint.";
                consoleOut.classList.replace('text-slate-500', 'text-rose-400');
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-microchip"></i> Synthesize Design';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
