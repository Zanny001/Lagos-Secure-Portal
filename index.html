<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zannie Real Estate Analytics</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-green: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }
        header {
            margin-bottom: 24px;
            border-bottom: 1px solid #334155;
            padding-bottom: 12px;
        }
        h1 { font-size: 1.5rem; margin: 0 0 4px 0; color: var(--text-main); }
        .subtitle { font-size: 0.875rem; color: var(--text-muted); margin: 0; }
        #dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 16px;
        }
        .card-header {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--accent-green);
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-size: 0.95rem;
        }
        .metric-label { color: var(--text-muted); }
        .metric-value { font-weight: 600; }
        .timestamp {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 12px;
            text-align: right;
            border-top: 1px solid #334155;
            padding-top: 6px;
        }
        .btn-reload {
            display: block;
            width: 100%;
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>Zannie Analytics Panel</h1>
        <p class="subtitle">Live Lagos Real Estate Data Feed</p>
    </header>

    <button class="btn-reload" onclick="loadMarketMetrics()">Refresh Live Metrics</button>

    <div id="dashboard-grid">
        </div>

    <script>
        // API endpoint configuration (Pointed to your active port 5005)
        const API_ENDPOINT = "http://127.0.0.1:5005/api/v1/analytics/market-summary";

        async function loadMarketMetrics() {
            const grid = document.getElementById('dashboard-grid');
            
            try {
                const response = await fetch(API_ENDPOINT);
                if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
                
                const data = await response.json();
                grid.innerHTML = ""; // Flush old content

                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Format numeric values cleanly to standard Nigerian Currency presentation
                    const formattedPrice = new Intl.NumberFormat('en-NG', {
                        style: 'currency',
                        currency: 'NGN',
                        maximumFractionDigits: 0
                    }).format(item.average_price_ngn);

                    card.innerHTML = `
                        <div class="card-header">${item.location}</div>
                        <div class="metric-row">
                            <span class="metric-label">Total Volume:</span>
                            <span class="metric-value">${item.total_listings} Properties</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Average Index Price:</span>
                            <span class="metric-value">${formattedPrice}</span>
                        </div>
                        <div class="timestamp">Last Sampled: ${item.last_updated}</div>
                    `;
                    grid.appendChild(card);
                });
                
            } catch (error) {
                console.error("UI Fetch Pipeline Exception:", error);
                grid.innerHTML = `<div class="card" style="border-color: #ef4444; color: #f87171;">
                    <strong>Pipeline Offline</strong><br>
                    Unable to fetch data streams. Ensure Flask server is running on Port 5005.
                </div>`;
            }
        }

        // Initialize display automatically on page paint
        window.onload = loadMarketMetrics;
    </script>
</body>
</html>
