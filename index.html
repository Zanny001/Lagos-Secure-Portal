<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zannie Market Intelligence Hub</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-cyan: #38bdf8;
            --accent-green: #4ade80;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 15px;
        }

        header {
            background: linear-gradient(135deg, #1e1b4b, #1e293b);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.6rem;
            color: var(--accent-cyan);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .search-container {
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 14px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent-cyan);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .metric-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 18px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .metric-card:hover {
            border-color: var(--accent-cyan);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 8px;
        }

        .location-tag {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            background-color: rgba(74, 222, 128, 0.15);
            color: var(--accent-green);
        }

        .price-row {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: 8px;
        }

        .meta-row {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>ZANNIE INTEL METRICS HUB</h1>
        <p>Real-Time Lagos Real Estate & Commercial Sector Analytics</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Quick search sectors (e.g. Lekki, Alaba, Ikeja)..." onkeyup="filterSectors()">
    </div>

    <div class="stats-grid" id="metricsGrid">
        </div>

    <script>
        // Placeholder data format that mirrors your live Flask SQLite database endpoint pipeline arrays
        const sampleRealEstateData = [
            { location: "Lekki Phase 1 Sector", price: 125000000, listings: 14, class: "Premium Residential" },
            { location: "Alaba International Segment", price: 45000000, listings: 28, class: "Commercial Hub" },
            { location: "Ikeja GRA Block", price: 95000000, listings: 9, class: "Premium Residential" },
            { location: "VGC Waterfront Sector", price: 150000000, listings: 6, class: "High-End Estate" }
        ];

        const API_ENDPOINT = "http://127.0.0.1:5005/api/metrics";

        function formatCurrency(value) {
            return "₦" + value.toLocaleString();
        }

        function renderCards(data) {
            const grid = document.getElementById("metricsGrid");
            grid.innerHTML = "";

            if (data.length === 0) {
                grid.innerHTML = `<div class="no-results">No sectors match your active filtering parameters.</div>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement("div");
                card.className = "metric-card";
                card.innerHTML = `
                    <div class="card-header">
                        <span class="location-tag">${item.location}</span>
                        <span class="status-badge">${item.class}</span>
                    </div>
                    <div class="price-row">${formatCurrency(item.price)}</div>
                    <div class="meta-row">
                        <span>Active Listings: <strong>${item.listings}</strong></span>
                        <span>Telemetry: Verified</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function initMetricsDashboard() {
            try {
                // Fetch dynamic cross-origin real-time rows straight from your local Flask API on port 5005
                const response = await fetch(API_ENDPOINT, { method: 'GET' });
                if (response.ok) {
                    const dynamicData = await response.json();
                    renderCards(dynamicData);
                    // Attach database arrays to window global cache for search runtime access
                    window.dashboardCache = dynamicData;
                } else {
                    throw new Error("API offline");
                }
            } catch (error) {
                printFallback("[*] Fallback mapping activated. Rendering local baseline analytics.");
                renderCards(sampleRealEstateData);
                window.dashboardCache = sampleRealEstateData;
            }
        }

        function printFallback(msg) {
            console.log(msg);
        }

        function filterSectors() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const sourceData = window.dashboardCache || sampleRealEstateData;
            
            const filtered = sourceData.filter(item => 
                item.location.toLowerCase().includes(query) || 
                item.class.toLowerCase().includes(query)
            );
            
            renderCards(filtered);
        }

        // Initialize user interface pipeline on load completion
        window.onload = initMetricsDashboard;
    </script>
</body>
</html>
