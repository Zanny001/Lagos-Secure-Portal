<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zannie Intelligence Hub</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-cyan: #38bdf8;
            --accent-green: #4ade80;
            --accent-purple: #a855f7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 15px;
        }

        header {
            background: linear-gradient(135deg, #1e1b4b, #1e293b);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-align: center;
        }

        @media(min-width: 600px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                text-align: left;
            }
        }

        header h1 {
            font-size: 1.6rem;
            color: var(--accent-cyan);
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .status-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(51, 65, 85, 0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid var(--border-color);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-red);
            border-radius: 50%;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .status-dot.online {
            background-color: var(--accent-green);
            box-shadow: 0 0 8px var(--accent-green);
        }

        /* Navigation Tabs Control Layout */
        .tab-navigation {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            border-radius: 6px;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--accent-cyan);
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
        }

        .search-container {
            margin-bottom: 20px;
        }

        .search-box {
            width: 100%;
            padding: 14px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent-cyan);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .metric-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 18px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .metric-card:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 8px;
        }

        .location-tag {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: bold;
            background-color: rgba(56, 189, 248, 0.15);
            color: var(--accent-cyan);
        }

        .status-badge.academic-badge {
            background-color: rgba(168, 85, 247, 0.15);
            color: var(--accent-purple);
        }

        .price-row {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-cyan);
            margin-bottom: 8px;
        }

        .price-row.academic-score {
            color: var(--accent-green);
        }

        .meta-row {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 1rem;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>ZANNIE INTEL METRICS HUB</h1>
            <p>Unified Enterprise Analytics & Telemetry Dashboard</p>
        </div>
        <div class="status-container">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">Initial Sync Route...</span>
        </div>
    </header>

    <div class="tab-navigation">
        <button id="realestateTab" class="tab-btn active" onclick="switchModule('realestate')">🏙️ Real Estate Scraper</button>
        <button id="academicTab" class="tab-btn" onclick="switchModule('academic')">🎓 Academic Analytics</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Quick search metrics..." onkeyup="filterActiveView()">
    </div>

    <div class="stats-grid" id="metricsGrid">
        <!-- Structural cards dynamically load here -->
    </div>

    <script>
        // High-Fidelity Local Fallbacks for Resiliency
        const fallbackRealEstate = [
            { location: "Lekki Phase 1 Sector", price: 125000000, listings: 14, class: "Premium Residential" },
            { location: "Alaba International Segment", price: 45000000, listings: 28, class: "Commercial Hub" },
            { location: "Ikeja GRA Block", price: 95000000, listings: 9, class: "Premium Residential" },
            { location: "VGC Waterfront Sector", price: 150000000, listings: 6, class: "High-End Estate" }
        ];

        const fallbackAcademic = [
            { name: "Kehinde", track: "WAEC Preparatory", average: 88.5, attendance: 95.0 },
            { name: "Tooki", track: "IGCSE Extended", average: 82.1, attendance: 92.0 },
            { name: "Odutana Agboola", track: "WAEC Science", average: 79.4, attendance: 88.0 },
            { name: "Demi", track: "IGCSE Core", average: 85.0, attendance: 94.0 }
        ];

        // Core Endpoint Matrix
        const BASE_URL = "https://modern-worlds-repair.loca.lt";
        let activeModule = 'realestate';
        window.moduleDataCache = [];

        function renderRealEstateCards(data) {
            const grid = document.getElementById("metricsGrid");
            grid.innerHTML = "";
            if (data.length === 0) {
                grid.innerHTML = `<div class="no-results">No sectors match your filtering query.</div>`;
                return;
            }
            data.forEach(item => {
                const card = document.createElement("div");
                card.className = "metric-card";
                card.innerHTML = `
                    <div class="card-header">
                        <span class="location-tag">${item.location}</span>
                        <span class="status-badge">${item.class}</span>
                    </div>
                    <div class="price-row">₦${Number(item.price).toLocaleString()}</div>
                    <div class="meta-row">
                        <span>Active Listings: <strong>${item.listings}</strong></span>
                        <span>Telemetry: Verified</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderAcademicCards(data) {
            const grid = document.getElementById("metricsGrid");
            grid.innerHTML = "";
            if (data.length === 0) {
                grid.innerHTML = `<div class="no-results">No student files match your filtering query.</div>`;
                return;
            }
            data.forEach(item => {
                const card = document.createElement("div");
                card.className = "metric-card";
                card.innerHTML = `
                    <div class="card-header">
                        <span class="location-tag">${item.name}</span>
                        <span class="status-badge academic-badge">${item.track}</span>
                    </div>
                    <div class="price-row academic-score">${item.average.toFixed(1)}%</div>
                    <div class="meta-row">
                        <span>Attendance Tracker: <strong>${item.attendance.toFixed(1)}%</strong></span>
                        <span>Status: Evaluated</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function fetchModuleData() {
            const dot = document.getElementById("statusDot");
            const text = document.getElementById("statusText");
            const endpoint = activeModule === 'realestate' ? `${BASE_URL}/api/metrics` : `${BASE_URL}/api/students`;

            try {
                const response = await fetch(endpoint, {
                    method: 'GET',
                    headers: { "Bypass-Tunnel-Reminder": "true" }
                });

                if (response.ok) {
                    const data = await response.json();
                    window.moduleDataCache = data;
                    dot.classList.add("online");
                    text.innerText = "System Synced & Live";
                    
                    if (activeModule === 'realestate') renderRealEstateCards(data);
                    else renderAcademicCards(data);
                } else {
                    throw new Error("API non-OK status");
                }
            } catch (error) {
                console.log(`[-] Local tunnel endpoint offline. Engaging cache fallbacks.`);
                dot.classList.remove("online");
                text.innerText = "Pipeline Offline (Cached)";
                
                const fallbackData = activeModule === 'realestate' ? fallbackRealEstate : fallbackAcademic;
                window.moduleDataCache = fallbackData;
                if (activeModule === 'realestate') renderRealEstateCards(fallbackData);
                else renderAcademicCards(fallbackData);
            }
        }

        function switchModule(targetModule) {
            activeModule = targetModule;
            document.getElementById("realestateTab").classList.toggle("active", targetModule === 'realestate');
            document.getElementById("academicTab").classList.toggle("active", targetModule === 'academic');
            
            const searchInput = document.getElementById("searchInput");
            if (targetModule === 'realestate') {
                searchInput.placeholder = "🔍 Quick search sectors (e.g. Lekki, Alaba)...";
            } else {
                searchInput.placeholder = "🔍 Quick search students (e.g. Kehinde, Tooki)...";
            }
            searchInput.value = "";
            fetchModuleData();
        }

        function filterActiveView() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const sourceData = window.moduleDataCache;

            if (activeModule === 'realestate') {
                const filtered = sourceData.filter(item =>
                    item.location.toLowerCase().includes(query) ||
                    item.class.toLowerCase().includes(query)
                );
                renderRealEstateCards(filtered);
            } else {
                const filtered = sourceData.filter(item =>
                    item.name.toLowerCase().includes(query) ||
                    item.track.toLowerCase().includes(query)
                );
                renderAcademicCards(filtered);
            }
        }

        // Initialize default view on window load
        window.onload = () => switchModule('realestate');
    </script>
</body>
</html>
